name: "✅ Validate Infrastructure Config"

on:
  pull_request:
    branches: [main]
    paths:
      - "inventory/**"
      - "profiles/**"
      - "kickstarts/**"
      - "scripts/**"

jobs:
  validate:
    name: "📋 YAML 스키마 검증"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Validate inventory
        run: python3 scripts/validate_inventory.py

  diff-preview:
    name: "🔍 Cobbler Diff Preview"
    needs: validate
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Build Cobbler test image
        run: docker build -t cobbler-test:local docker/cobbler-test/

      - name: Start Cobbler server
        run: |
          docker run -d --name cobbler --privileged \
            -p 80:80 -p 443:443 \
            cobbler-test:local
          echo "Cobbler container started"

      - name: Wait for Cobbler API
        run: |
          echo "Cobbler API 준비 대기 중..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/cobbler_api >/dev/null 2>&1; then
              echo "Cobbler API ready"
              exit 0
            fi
            echo "  대기 중... ($i/30)"
            sleep 2
          done
          echo "ERROR: Cobbler API 시작 시간 초과"
          docker logs cobbler
          exit 1

      - name: Setup Cobbler test data
        run: docker exec cobbler bash < scripts/ci/setup-cobbler.sh

      - name: Generate diff
        id: diff
        env:
          COBBLER_URL: http://localhost/cobbler_api
          COBBLER_USER: cobbler
          COBBLER_PASS: cobbler
        run: |
          python3 -m scripts.cobbler_diff --output-format github > diff_output.txt
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          cat diff_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            if (diff.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🔄 Cobbler Sync Plan\n\n\`\`\`\n${diff}\n\`\`\`\n\n⚠️ 이 변경사항을 Cobbler에 반영하려면 merge 후 **Manual Cobbler Sync** 워크플로우를 수동으로 실행하세요.`
              });
            }

      - name: Cleanup Cobbler container
        if: always()
        run: docker rm -f cobbler || true
