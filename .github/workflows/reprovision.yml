name: "🔄 Server OS Reprovision"

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "대상 서버 (Cobbler system name)"
        required: true
        type: string
      profile:
        description: "OS 프로파일"
        required: true
        type: choice
        options:
          - rhel9-x86_64
          - rhel8-x86_64
          - ubuntu2204-x86_64
          - ubuntu2404-x86_64
          - rocky9-x86_64
      bmc_ip:
        description: "BMC/IPMI IP 주소"
        required: true
        type: string
      use_efi:
        description: "EFI 부팅 사용"
        required: true
        type: boolean
        default: true
      confirm_server_name:
        description: "⚠️ 서버명을 다시 입력하세요 (확인용)"
        required: true
        type: string

jobs:
  pre-check:
    name: "🔍 사전 검증"
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    outputs:
      current_profile: ${{ steps.check.outputs.current_profile }}
    steps:
      - uses: actions/checkout@v4

      - name: 서버명 확인
        run: |
          if [ "${{ inputs.server_name }}" != "${{ inputs.confirm_server_name }}" ]; then
            echo "❌ 서버명이 일치하지 않습니다."
            echo "   입력: ${{ inputs.server_name }}"
            echo "   확인: ${{ inputs.confirm_server_name }}"
            exit 1
          fi
          echo "✅ 서버명 확인 완료: ${{ inputs.server_name }}"

      - name: Cobbler 시스템 존재 확인
        id: check
        env:
          COBBLER_URL: ${{ secrets.COBBLER_API_URL }}
          COBBLER_USER: ${{ secrets.COBBLER_USER }}
          COBBLER_PASS: ${{ secrets.COBBLER_PASS }}
        run: |
          OUTPUT=$(python3 scripts/cobbler_client.py get-system "${{ inputs.server_name }}" 2>&1)
          if [ $? -ne 0 ]; then
            echo "❌ 시스템을 찾을 수 없습니다: ${{ inputs.server_name }}"
            exit 1
          fi
          CURRENT_PROFILE=$(echo "$OUTPUT" | grep "Profile:" | awk '{print $2}')
          echo "current_profile=$CURRENT_PROFILE" >> "$GITHUB_OUTPUT"
          echo "✅ 시스템 확인 완료: ${{ inputs.server_name }} (현재 프로파일: $CURRENT_PROFILE)"

      - name: 프로파일 존재 확인
        env:
          COBBLER_URL: ${{ secrets.COBBLER_API_URL }}
          COBBLER_USER: ${{ secrets.COBBLER_USER }}
          COBBLER_PASS: ${{ secrets.COBBLER_PASS }}
        run: |
          PROFILES=$(python3 scripts/cobbler_client.py list-profiles 2>&1)
          if ! echo "$PROFILES" | grep -q "${{ inputs.profile }}"; then
            echo "❌ 프로파일이 존재하지 않습니다: ${{ inputs.profile }}"
            echo "사용 가능한 프로파일:"
            echo "$PROFILES"
            exit 1
          fi
          echo "✅ 프로파일 확인 완료: ${{ inputs.profile }}"

      - name: 변경 사항 요약 출력
        run: |
          echo "🔄 ${{ inputs.server_name }}: ${{ steps.check.outputs.current_profile }} → ${{ inputs.profile }}"

  reprovision:
    name: "🚀 OS 재배포"
    needs: pre-check
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    environment: bare-metal-prod
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Cobbler 프로파일 설정 및 Netboot 활성화
        env:
          COBBLER_URL: ${{ secrets.COBBLER_API_URL }}
          COBBLER_USER: ${{ secrets.COBBLER_USER }}
          COBBLER_PASS: ${{ secrets.COBBLER_PASS }}
        run: python3 scripts/cobbler_client.py reprovision "${{ inputs.server_name }}" "${{ inputs.profile }}"

      - name: IPMI PXE 부팅 설정 및 전원 재시작
        env:
          IPMI_USER: ${{ secrets.IPMI_USER }}
          IPMI_PASS: ${{ secrets.IPMI_PASS }}
        run: |
          EFI_FLAG=""
          if [ "${{ inputs.use_efi }}" = "true" ]; then
            EFI_FLAG="--efi"
          fi
          python3 scripts/ipmi_control.py pxe-boot "${{ inputs.bmc_ip }}" $EFI_FLAG
          python3 scripts/ipmi_control.py power-cycle "${{ inputs.bmc_ip }}"

      - name: OS 설치 완료 대기
        run: python3 scripts/wait_for_ssh.py "${{ inputs.server_name }}" --timeout 30

      - name: Netboot 비활성화 (재부팅 루프 방지)
        if: success()
        env:
          COBBLER_URL: ${{ secrets.COBBLER_API_URL }}
          COBBLER_USER: ${{ secrets.COBBLER_USER }}
          COBBLER_PASS: ${{ secrets.COBBLER_PASS }}
        run: |
          python3 -c "
          from scripts.cobbler_client import CobblerClient
          import os
          c = CobblerClient(os.environ['COBBLER_URL'], os.environ['COBBLER_USER'], os.environ['COBBLER_PASS'])
          c.disable_netboot('${{ inputs.server_name }}')
          c.sync()
          print('✅ Netboot disabled, Cobbler synced')
          "

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "## 배포 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "| 항목 | 값 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 서버 | ${{ inputs.server_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 프로파일 | ${{ inputs.profile }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 이전 프로파일 | ${{ needs.pre-check.outputs.current_profile }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 상태 | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 실행자 | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 시간 | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
