name: "🧪 CI Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  validate-inventory:
    name: "Validate Inventory YAML"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate inventory schemas
        run: python scripts/validate_inventory.py

      - name: Validate cluster definitions
        run: python scripts/cluster_manager.py validate

  lint:
    name: "Lint & Type Check"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-PyYAML

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Ruff format check
        run: ruff format --check scripts/ tests/

      - name: Mypy type check
        run: mypy scripts/ --ignore-missing-imports --no-strict-optional --disable-error-code=import-untyped

  yaml-lint:
    name: "YAML Lint"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: disable}}" \
            inventory/ profiles/ clusters/ .github/workflows/

  workflow-validation:
    name: "Workflow Syntax Check"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow files
        run: |
          for f in .github/workflows/*.yml; do
            echo "Checking $f..."
            # YAML 파싱 가능 여부 확인
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
            echo "  ✅ $f is valid YAML"
          done
