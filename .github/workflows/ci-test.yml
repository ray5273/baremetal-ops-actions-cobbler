name: "🧪 CI Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  validate-inventory:
    name: "Validate Inventory YAML"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate inventory schemas
        run: python scripts/validate_inventory.py

      - name: Validate cluster definitions
        run: python scripts/cluster_manager.py validate

  lint:
    name: "Lint & Type Check"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy types-PyYAML

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Ruff format check
        run: ruff format --check scripts/ tests/

      - name: Mypy type check
        run: mypy scripts/ --ignore-missing-imports --no-strict-optional --disable-error-code=import-untyped

  yaml-lint:
    name: "YAML Lint"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, truthy: disable}}" \
            inventory/ profiles/ clusters/ .github/workflows/

  workflow-validation:
    name: "Workflow Syntax Check"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow files
        run: |
          for f in .github/workflows/*.yml; do
            echo "Checking $f..."
            # YAML 파싱 가능 여부 확인
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
            echo "  ✅ $f is valid YAML"
          done

  integration-tests:
    name: "Integration Tests (Cobbler)"
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build Cobbler test image
        run: docker build -t cobbler-test:local docker/cobbler-test/

      - name: Start Cobbler server
        run: |
          docker run -d --name cobbler --privileged \
            -p 80:80 -p 443:443 \
            cobbler-test:local
          echo "Cobbler container started"

      - name: Wait for Cobbler API
        run: |
          echo "Cobbler API 준비 대기 중..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/cobbler_api >/dev/null 2>&1; then
              echo "Cobbler API ready"
              exit 0
            fi
            echo "  대기 중... ($i/30)"
            sleep 2
          done
          echo "ERROR: Cobbler API 시작 시간 초과"
          docker logs cobbler
          docker exec cobbler cat /var/log/apache2/error.log 2>/dev/null || true
          docker exec cobbler cat /etc/apache2/conf-available/cobbler.conf 2>/dev/null || true
          docker exec cobbler supervisorctl status 2>/dev/null || true
          exit 1

      - name: Setup Cobbler test data
        run: |
          docker cp scripts/ci/setup-cobbler.sh cobbler:/tmp/setup-cobbler.sh
          docker exec cobbler bash /tmp/setup-cobbler.sh

      - name: Run integration tests
        env:
          COBBLER_URL: http://localhost/cobbler_api
          COBBLER_USER: cobbler
          COBBLER_PASS: cobbler
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Smoke test - cobbler_diff
        env:
          COBBLER_URL: http://localhost/cobbler_api
          COBBLER_USER: cobbler
          COBBLER_PASS: cobbler
        run: python3 -m scripts.cobbler_diff --output-format json

      - name: Smoke test - cobbler_sync dry-run
        env:
          COBBLER_URL: http://localhost/cobbler_api
          COBBLER_USER: cobbler
          COBBLER_PASS: cobbler
        run: python3 -m scripts.cobbler_sync --dry-run

      - name: Cleanup Cobbler container
        if: always()
        run: docker rm -f cobbler || true
